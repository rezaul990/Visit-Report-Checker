<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCM/RSM Visit Report (POS)</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .container {
        background: white;
        padding: 40px;
        border-radius: 20px;
        max-width: 600px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(-30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    h2 {
        color: #2d3748;
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 30px;
        text-align: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .credit {
        text-align: center;
        color: #2d3748;
        font-size: 15px;
        font-weight: 700;
        padding: 16px;
        background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
        border-radius: 10px;
        margin-bottom: 24px;
        border: 2px solid rgba(102, 126, 234, 0.2);
        box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
    }

    .credit.bottom {
        margin-top: 24px;
        margin-bottom: 0;
    }

    .credit .heart {
        color: #e53e3e;
        font-size: 16px;
        animation: heartbeat 1.5s ease-in-out infinite;
        display: inline-block;
    }

    @keyframes heartbeat {
        0%, 100% { transform: scale(1); }
        25% { transform: scale(1.2); }
    }

    label {
        display: block;
        color: #4a5568;
        font-weight: 600;
        margin-bottom: 8px;
        margin-top: 16px;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    input {
        padding: 14px 16px;
        width: 100%;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        font-size: 16px;
        transition: all 0.3s ease;
        background: #f7fafc;
    }

    input:focus {
        outline: none;
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
        padding: 14px;
        width: 100%;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    button:not(.date-btn) {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        margin-top: 24px;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    button:not(.date-btn):hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    button:not(.date-btn):active {
        transform: translateY(0);
    }

    #output {
        margin-top: 30px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 12px;
    }

    .date-btn {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: white;
        padding: 12px;
        margin: 0;
        box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
        font-size: 14px;
    }

    .date-btn:hover {
        background: linear-gradient(135deg, #059669 0%, #047857 100%);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.5);
    }

    .date-btn:active {
        transform: translateY(0);
    }

    @media (max-width: 640px) {
        body {
            padding: 12px;
        }

        .container {
            padding: 24px 20px;
        }

        h2 {
            font-size: 20px;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .credit {
            font-size: 13px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .credit.bottom {
            margin-top: 16px;
        }

        .credit .heart {
            font-size: 14px;
        }

        label {
            font-size: 12px;
            margin-top: 12px;
        }

        input {
            padding: 12px 14px;
            font-size: 16px; /* Prevents zoom on iOS */
        }

        button:not(.date-btn) {
            padding: 12px;
            font-size: 14px;
            margin-top: 20px;
        }

        #output {
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            margin-top: 20px;
        }

        .date-btn {
            padding: 10px 8px;
            font-size: 12px;
        }
    }

    @media (max-width: 400px) {
        .container {
            padding: 20px 16px;
        }

        h2 {
            font-size: 18px;
        }

        #output {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    /* Tablet styles */
    @media (min-width: 641px) and (max-width: 1024px) {
        .container {
            max-width: 500px;
        }

        #output {
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        }
    }

    /* Landscape mobile */
    @media (max-height: 600px) and (orientation: landscape) {
        body {
            padding: 10px;
        }

        .container {
            padding: 20px;
        }

        h2 {
            font-size: 22px;
            margin-bottom: 16px;
        }

        label {
            margin-top: 10px;
        }
    }
</style>
</head>
<body>

<div class="container">
    <div class="credit">Developed with <span class="heart">❤</span> by Md Rezaul Karim (BLcian)</div>
    
    <h2>RCM/RSM Visit Report (POS)</h2>

    <label>From Date:</label>
    <input type="date" id="fromDate">

    <label>To Date:</label>
    <input type="date" id="toDate">

    <label>Employee ID:</label>
    <input type="text" id="employeeId">

    <button onclick="generateButtons()">Generate</button>

    <div id="output"></div>

    <div class="credit bottom">Developed with <span class="heart">❤</span> by Md Rezaul Karim (BLcian)</div>
</div>

<script>
function formatDate(date) {
    let d = new Date(date);
    let day = String(d.getDate()).padStart(2, '0');
    let month = String(d.getMonth() + 1).padStart(2, '0');
    let year = d.getFullYear();
    return `${day}%2F${month}%2F${year}`;
}

function displayDate(date) {
    let d = new Date(date);
    let day = String(d.getDate()).padStart(2, '0');
    let month = String(d.getMonth() + 1).padStart(2, '0');
    let year = d.getFullYear();
    return `${day}.${month}.${year}`;
}

function generateButtons() {
    let fromDate = document.getElementById("fromDate").value;
    let toDate = document.getElementById("toDate").value;
    let employeeId = document.getElementById("employeeId").value;
    let output = document.getElementById("output");

    output.innerHTML = "";

    if (!fromDate || !toDate || !employeeId) {
        alert("Please fill all fields!");
        return;
    }

    let start = new Date(fromDate);
    let end = new Date(toDate);

    while (start <= end) {
        let formatted = formatDate(start);
        let display = displayDate(start);

        let link = `https://pos.waltonbd.com/pos/plazaVisitInfo/list?fromDate=${formatted}&toDate=${formatted}&period=&employeeId=${employeeId}`;

        let btn = document.createElement("button");
        btn.className = "date-btn";
        btn.textContent = display;

        btn.onclick = function() {
            window.open(link, "_blank");
        };

        output.appendChild(btn);

        start.setDate(start.getDate() + 1);
    }
}
</script>

</body>
</html>
